<!DOCTYPE html>
<html lang="zh-CN">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.95); border-radius: 20px;
            padding: 30px; margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 20px;
        }
        .stock-title { display: flex; align-items: center; gap: 15px; }
        .stock-code-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; padding: 8px 16px; border-radius: 12px;
            font-size: 24px; font-weight: bold;
        }
        .stock-type-tag {
            display: inline-block; padding: 4px 12px; border-radius: 12px;
            font-size: 12px; margin-left: 10px; font-weight: normal;
        }
        .stock-type-tag.stock { background: #4caf50; color: white; }
        .stock-type-tag.bond { background: #ff9800; color: white; }
        .stock-type-tag.etf { background: #2196f3; color: white; }
        .stock-name { font-size: 28px; font-weight: bold; color: #1a1a2e; }
        .price-display { text-align: right; }
        .current-price { font-size: 48px; font-weight: bold; color: #1a1a2e; }
        .price-change {
            font-size: 24px; font-weight: bold;
            color: green;
            margin-top: 5px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.95); border-radius: 16px;
            padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .card-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 20px; padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .card-icon { font-size: 28px; }
        .card-title { font-size: 20px; font-weight: bold; }
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .data-item {
            background: #f8f9fa; border-radius: 12px;
            padding: 14px;
        }
        .data-item.highlight {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border: 1px solid #4caf50;
        }
        .data-item.highlight.red {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            border: 1px solid #e57373;
        }
        .data-item.highlight.blue {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border: 1px solid #64b5f6;
        }
        .data-item.highlight.gold {
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
            border: 1px solid #ffd54f;
        }
        .data-label { font-size: 12px; color: #666; margin-bottom: 6px; }
        .data-value { font-size: 18px; font-weight: bold; color: #1a1a2e; }
        .data-sub { font-size: 11px; color: #888; margin-top: 4px; }
        .footer {
            text-align: center; padding: 30px;
            color: rgba(255,255,255,0.8); font-size: 13px;
        }
        .back-link {
            display: inline-block; margin-bottom: 20px;
            color: white; text-decoration: none;
            background: rgba(255,255,255,0.2); padding: 10px 20px;
            border-radius: 20px;
        }
        .warning-box {
            background: #fff3e0; border: 1px solid #ff9800;
            border-radius: 12px; padding: 15px; margin-bottom: 20px;
            color: #e65100;
        }
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .price-display { text-align: center; }
            .current-price { font-size: 36px; }
        }

</head>
